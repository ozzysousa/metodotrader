    <!-- Bloqueia indexação em domínios de preview/staging (.lovable.app). Apenas metodotrader.online é indexável. -->

      (function () {
        try {
          var host = window.location.hostname;
          if (host && host.indexOf("metodotrader.online") === -1) {
            var m = document.createElement("meta");
            m.name = "robots";
            m.content = "noindex, nofollow";
            document.head.appendChild(m);
          }
        } catch (e) {}
      })();
    </script>
